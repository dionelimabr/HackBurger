apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackburger-frontend
  namespace: hackburger
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: hackburger/frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
