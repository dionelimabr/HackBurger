<header class="page-header">
  <div>
    <h1>Usuários</h1>
    <p>Ativar ou desativar contas</p>
  </div>
</header>

<div *ngIf="loading" class="state">Carregando...</div>

<table *ngIf="!loading" class="admin-table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>E-mail</th>
      <th>Perfil</th>
      <th>Status</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let u of users">
      <td>{{ u.id }}</td>
      <td>{{ u.name }}</td>
      <td>{{ u.email }}</td>
      <td>{{ u.role }}</td>
      <td><span class="tag" [class.on]="u.is_active">{{ u.is_active ? 'Ativo' : 'Inativo' }}</span></td>
      <td class="row-actions">
        <button (click)="toggle(u)">{{ u.is_active ? 'Desativar' : 'Ativar' }}</button>
      </td>
    </tr>
    <tr *ngIf="!users.length"><td colspan="6" class="empty">Nenhum usuário.</td></tr>
  </tbody>
</table>
