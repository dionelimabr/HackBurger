<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <img src="assets/images/branding/logo.png" alt="HackBurger Logo" class="logo">
      <h1>Crie sua conta</h1>
      <p>Junte-se à revolução do hambúrguer artesanal</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="name">Nome Completo</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="name" formControlName="name" placeholder="Ex: João Silva"
                 [class.error]="registerForm.get('name')?.touched && registerForm.get('name')?.invalid">
        </div>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" formControlName="email" placeholder="seu@email.com"
                 [class.error]="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Senha</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" formControlName="password" placeholder="••••••••"
                   [class.error]="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar</label>
          <div class="input-wrapper">
            <i class="fas fa-shield-alt"></i>
            <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="••••••••"
                   [class.error]="registerForm.get('confirmPassword')?.touched && (registerForm.get('confirmPassword')?.invalid || registerForm.hasError('mismatch'))">
          </div>
        </div>
      </div>

      <div *ngIf="error" class="error-alert">
        {{ error }}
      </div>

      <button type="submit" class="submit-btn" [disabled]="registerForm.invalid || loading">
        <span *ngIf="!loading">Cadastrar Conta</span>
        <span *ngIf="loading" class="loader"></span>
      </button>

      <div class="auth-footer">
        Já tem uma conta? <a routerLink="/auth/login">Faça Login</a>
      </div>
    </form>
  </div>
</div>
