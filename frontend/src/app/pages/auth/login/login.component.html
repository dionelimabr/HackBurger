<div class="auth-wrapper">
  <div class="auth-container">
    <h2>Login to HackBurger</h2>
    <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
    
    <form (ngSubmit)="login()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="credentials.email" required placeholder="admin@hackburger.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="credentials.password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>
    
    <p class="switch-auth">Don't have an account? <a routerLink="/auth/register">Sign Up</a></p>
  </div>
</div>
